<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion ↔ Google Calendar Sync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 400px;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    p { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
    button {
      background: #fff;
      color: #000;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      min-height: 1.2em;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    pre {
      text-align: left;
      background: #1a1a1a;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 0.8rem;
      overflow-x: auto;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Notion ↔ GCal Sync</h1>
    <p>Auto-syncs every 15 minutes. Click below to sync now.</p>
    <button id="syncBtn" onclick="doSync()">Sync Now</button>
    <div id="status"></div>
  </div>
  <script>
    async function doSync() {
      const btn = document.getElementById('syncBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.textContent = 'Syncing...';
      status.textContent = '';
      status.className = '';

      try {
        const res = await fetch('/api/sync', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          status.className = 'success';
          const n2g = data.notionToGoogle;
          status.innerHTML = `Synced! ${n2g.created} created, ${n2g.updated} updated, ${n2g.deleted} deleted in Google Calendar.`;
          if (data.errors?.length) {
            status.innerHTML += `<pre>${data.errors.join('\n')}</pre>`;
          }
        } else {
          status.className = 'error';
          status.textContent = data.error || 'Sync failed';
        }
      } catch (err) {
        status.className = 'error';
        status.textContent = 'Network error';
      }
      btn.disabled = false;
      btn.textContent = 'Sync Now';
    }
  </script>
</body>
</html>
